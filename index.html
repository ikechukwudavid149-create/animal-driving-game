<!DOCTYPE html>
<html>
<head>
  <title>Animal Racing Game</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #222;
      color: white;
      font-family: Arial;
      text-align: center;
    }
    #gameCanvas {
      background: #333;
      display: block;
      margin: auto;
    }
    #menu {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
    }
  </style>
</head>

<body>

<div id="menu">
  <h2>Choose Driver & Car</h2>

  Driver:
  <select id="driver">
    <option value="lion">🦁 Lion</option>
    <option value="tiger">🐅 Tiger</option>
    <option value="bear">🐻 Bear</option>
    <option value="horse">🐎 Horse</option>
  </select>

  Car:
  <select id="car">
    <option value="ferrari">Ferrari</option>
    <option value="lambo">Lamborghini</option>
    <option value="urus">Urus</option>
    <option value="rolls">Rolls Royce</option>
    <option value="audi">Audi</option>
    <option value="bugatti">Bugatti</option>
  </select>

  <button onclick="startGame()">Start Game</button>
</div>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
let canvas = document.getElementById("gameCanvas");
let ctx = canvas.getContext("2d");

let car = { x: 180, y: 500, speed: 5 };
let keys = {};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function startGame() {
  document.getElementById("menu").style.display = "none";
  gameLoop();
}

function drawCar() {
  ctx.fillStyle = "red";
  ctx.fillRect(car.x, car.y, 40, 70);
}

function drawDriver() {
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";

  let driver = document.getElementById("driver").value;

  let emoji = "🦁";
  if (driver === "tiger") emoji = "🐅";
  if (driver === "bear") emoji = "🐻";
  if (driver === "horse") emoji = "🐎";

  ctx.fillText(emoji, car.x + 5, car.y + 40);
}

function update() {
  if (keys["ArrowLeft"]) car.x -= car.speed;
  if (keys["ArrowRight"]) car.x += car.speed;
  if (keys["ArrowUp"]) car.y -= car.speed;
  if (keys["ArrowDown"]) car.y += car.speed;
}

function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  update();
  drawCar();
  drawDriver();

  requestAnimationFrame(gameLoop);
}
</script>

</body>
</html>
